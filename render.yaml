services:
  # Backend Service
  - type: web
    name: marketplace-backend
    env: python
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: https://marketplace-frontend.onrender.com # Update this after first deployment if needed
      - key: PYTHON_VERSION
        value: 3.12.0

  # Frontend Service
  - type: web
    name: marketplace-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./marketplace-frontend/dist
    rootDir: ./marketplace-frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: marketplace-backend
          property: host
        # Note: fromService property 'host' gives the internal URL. 
        # For public API calls, we might need the public URL.
        # Often it's easier to set this manually or use a relative path if proxied.
        # But Render static sites don't easily proxy to backend in Blueprints without extra config.

databases:
  - name: marketplace-db
    databaseName: marketplace
    user: marketplace_user
    plan: free
